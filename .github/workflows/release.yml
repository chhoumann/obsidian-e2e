name: Release

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changesets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version: 24

      - name: Install dependencies
        run: vp install

      - name: Create release pull request
        id: changesets
        uses: changesets/action@v1
        with:
          commit: "chore: version packages"
          createGithubReleases: false
          title: "chore: version packages"
          version: vp exec changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    if: needs.changesets.outputs.hasChangesets == 'false'
    needs:
      - changesets
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version: 24

      - name: Install dependencies
        run: vp install

      - name: Validate release
        run: vp exec pnpm run release:check

      - name: Publish to npm
        run: vp exec pnpm run release
